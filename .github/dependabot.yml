# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    groups:
      github-actions:
        patterns: ["*"]
        applies-to: both
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
    ignore:
      # chai is esmodule only.
      - dependency-name: "chai"
        versions: [">=5.0.0"]
      # sinon-chai 4.x+ supports chai 5.x+.
      - dependency-name: "sinon-chai"
        versions: [">=4.0.0"]
      # chalk is esmodule only.
      - dependency-name: "chalk"
        versions: [">=5.0.0"]
      # we ignore TS as a part of quarterly dependency updates.
      - dependency-name: "typescript"
      # node-gyp now depends on python 3.10, we install 3.6 in our dockerfile
      - dependency-name: "node-gyp"
      - dependency-name: "prebuild"
    groups:
      production-dependencies:
        dependency-type: "production"
        applies-to: both
        update-types:
          - "minor"
          - "patch"
      development-dependencies:
        dependency-type: "development"
        applies-to: both
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "npm"
    directory: "/test/bundling/webpack"
    schedule:
      interval: "monthly"
    groups:
      webpack-test-dependencies:
        patterns: ["*"]
        applies-to: both
        update-types:
          - "minor"
          - "patch"
